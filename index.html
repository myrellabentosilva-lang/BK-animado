<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Animado - Ajustado</title>
<style>
body {
margin: 0;
padding: 0;
background-color: black;
overflow: hidden;
height: 100vh;
width: 100vw;
display: flex;
justify-content: center;
align-items: center;
color: white;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Container da animação ao fundo */
.container-animado {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
}

/* Estilo do Texto Central - Ajustado para o tamanho da escrita */
.texto-central {
text-align: center;
padding: 10px 0; /* Espaço entre o texto e as linhas */
border-top: 3px solid white;
border-bottom: 3px solid white;
letter-spacing: 5px;
z-index: 1;
background-color: rgba(0, 0, 0, 0.6);
/* A mágica está aqui: */
display: inline-block;
width: auto;
padding-left: 10px;
padding-right: 10px;
}

.texto-central h1 {
margin: 0;
font-size: clamp(1.5rem, 8vw, 3rem);
font-weight: bold;
white-space: nowrap; /* Impede o texto de quebrar linha */
}

/* Estilo dos Quadrados */
.quadrado {
position: absolute;
background-color: white;
bottom: -150px;
animation: subir linear infinite;
}

/* Animação: Sobe e diminui a opacidade gradualmente */
@keyframes subir {
0% {
transform: translateY(0) rotate(0deg);
opacity: 1; /* Totalmente branco na base */
}
100% {
transform: translateY(-125vh) rotate(360deg);
opacity: 0; /* Totalmente transparente no topo */
}
}
</style>
</head>
<body>

<div class="texto-central">
<h1>BACKGROUND ANIMADO</h1>
</div>

<div class="container-animado" id="fundo"></div>

<script>
function criarQuadrados() {
const fundo = document.getElementById('fundo');
const quantidade = 45;

for (let i = 0; i < quantidade; i++) {
const quadrado = document.createElement('div');
quadrado.classList.add('quadrado');

// Tamanhos aleatórios
const tamanho = Math.random() * 50 + 10 + 'px';
quadrado.style.width = tamanho;
quadrado.style.height = tamanho;

// Posição e tempo aleatórios
quadrado.style.left = Math.random() * 100 + 'vw';
quadrado.style.animationDuration = Math.random() * 7 + 5 + 's';
quadrado.style.animationDelay = Math.random() * 10 + 's';

fundo.appendChild(quadrado);
}
}

window.onload = criarQuadrados;
</script>
</body>
</html>
